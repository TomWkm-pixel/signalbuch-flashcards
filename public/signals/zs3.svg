<!-- Zs 3 – Geschwindigkeitsanzeiger: gelbe beleuchtete Ziffer auf schwarzem Schirm -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" fill="none">
  <rect x="47" y="110" width="6" height="28" fill="#555"/>
  <rect x="10" y="10" width="80" height="100" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <!-- Gelber Kreis als Hintergrund für Ziffer -->
  <circle cx="50" cy="60" r="30" fill="#222"/>
  <circle cx="50" cy="60" r="26" fill="#1a1a00"/>
  <!-- Beispielziffer "6" = 60 km/h -->
  <text x="50" y="70" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#ffcc00">6</text>
  <text x="50" y="98" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">× 10 km/h</text>
</svg>
