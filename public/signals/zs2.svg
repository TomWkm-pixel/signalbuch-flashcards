<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Zs 2: Richtungsanzeiger – leuchtendes "A" (oder Pfeil) auf dunklem Hintergrund -->
  <rect width="120" height="120" fill="#0d0d0d" rx="6"/>
  <rect x="14" y="20" width="92" height="72" fill="#0d0d0d" stroke="#444" stroke-width="2" rx="4"/>
  <!-- Beleuchteter Buchstabe (z.B. "A" für Abzweig) in Weiß -->
  <text x="60" y="74" font-family="Arial Black,Arial,sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">A</text>
</svg>
