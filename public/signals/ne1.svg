<!-- Ne 1 – Trapeztafel: gelb-schwarze Trapezform -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none">
  <rect x="57" y="72" width="6" height="26" fill="#555"/>
  <!-- Trapeztafel: schmal oben, breit unten -->
  <polygon points="35,10 85,10 104,70 16,70" fill="#ffcc00" stroke="#111" stroke-width="3"/>
  <!-- Schwarz-gelbes Muster -->
  <polygon points="35,10 85,10 104,70 16,70" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Schwarze Diagonalstreifen -->
  <line x1="55" y1="10" x2="38" y2="70" stroke="#1a1a1a" stroke-width="7" opacity="0.6"/>
  <line x1="72" y1="10" x2="62" y2="70" stroke="#1a1a1a" stroke-width="7" opacity="0.6"/>
  <line x1="85" y1="10" x2="87" y2="70" stroke="#1a1a1a" stroke-width="7" opacity="0.6"/>
</svg>
