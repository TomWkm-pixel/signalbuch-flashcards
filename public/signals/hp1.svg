<!-- Hp 1 – Fahrt: ein grünes Licht auf schwarzem Signalschirm -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" fill="none">
  <rect x="47" y="110" width="6" height="28" fill="#555"/>
  <rect x="10" y="10" width="80" height="100" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <!-- Grünes Licht mittig -->
  <circle cx="50" cy="60" r="26" fill="#222"/>
  <circle cx="50" cy="60" r="20" fill="#00aa44" opacity="0.9"/>
  <circle cx="50" cy="60" r="20" fill="url(#greenGlow)" opacity="0.7"/>
  <circle cx="43" cy="53" r="6" fill="white" opacity="0.15"/>
  <defs>
    <radialGradient id="greenGlow" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#44ff88"/>
      <stop offset="100%" stop-color="#007733"/>
    </radialGradient>
  </defs>
</svg>
