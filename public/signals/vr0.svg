<!-- Vr 0 – Halt erwarten: zwei gelbe Lichter diagonal (oben-rechts / unten-links) auf rautenförmigem Schirm -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <rect x="57" y="130" width="6" height="28" fill="#555"/>
  <!-- Rautenförmiger Signalschirm -->
  <polygon points="60,8 112,60 60,112 8,60" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <!-- Gelbes Licht oben-rechts -->
  <circle cx="86" cy="34" r="18" fill="#222"/>
  <circle cx="86" cy="34" r="13" fill="#ddaa00" opacity="0.9"/>
  <circle cx="86" cy="34" r="13" fill="url(#yg1)" opacity="0.7"/>
  <circle cx="80" cy="28" r="4" fill="white" opacity="0.15"/>
  <!-- Gelbes Licht unten-links -->
  <circle cx="34" cy="86" r="18" fill="#222"/>
  <circle cx="34" cy="86" r="13" fill="#ddaa00" opacity="0.9"/>
  <circle cx="34" cy="86" r="13" fill="url(#yg2)" opacity="0.7"/>
  <circle cx="28" cy="80" r="4" fill="white" opacity="0.15"/>
  <defs>
    <radialGradient id="yg1" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffee44"/>
      <stop offset="100%" stop-color="#aa7700"/>
    </radialGradient>
    <radialGradient id="yg2" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffee44"/>
      <stop offset="100%" stop-color="#aa7700"/>
    </radialGradient>
  </defs>
</svg>
