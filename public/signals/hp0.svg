<!-- Hp 0 – Halt: zwei rote Lichter nebeneinander auf schwarzem Signalschirm -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" fill="none">
  <!-- Signalmast -->
  <rect x="47" y="110" width="6" height="28" fill="#555"/>
  <!-- Signalschirm -->
  <rect x="10" y="10" width="80" height="100" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <!-- Rotes Licht links -->
  <circle cx="35" cy="60" r="22" fill="#222"/>
  <circle cx="35" cy="60" r="17" fill="#cc0000" opacity="0.9"/>
  <circle cx="35" cy="60" r="17" fill="url(#redGlow)" opacity="0.7"/>
  <!-- Rotes Licht rechts -->
  <circle cx="65" cy="60" r="22" fill="#222"/>
  <circle cx="65" cy="60" r="17" fill="#cc0000" opacity="0.9"/>
  <circle cx="65" cy="60" r="17" fill="url(#redGlow2)" opacity="0.7"/>
  <!-- Glanzeffekte -->
  <circle cx="29" cy="54" r="5" fill="white" opacity="0.15"/>
  <circle cx="59" cy="54" r="5" fill="white" opacity="0.15"/>
  <defs>
    <radialGradient id="redGlow" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#990000"/>
    </radialGradient>
    <radialGradient id="redGlow2" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#990000"/>
    </radialGradient>
  </defs>
</svg>
